name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  PODMAN_SOCKET: unix:///run/user/1000/podman/podman.sock

jobs:
  # =============================================================
  #  TEST
  # =============================================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Unit Tests
        run: npx jest --no-coverage --forceExit --detectOpenHandles

      - name: Run E2E Tests
        run: npx jest --config ./test/jest-e2e.json --no-coverage --forceExit --detectOpenHandles

  # =============================================================
  #  BUILD & PUSH IMAGE
  # =============================================================
  build:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Lowercase repository name
        run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push refina-auth image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/refina-auth:${{ env.TAG_NAME }}

      - name: Build and push migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrate
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/migrate:${{ env.TAG_NAME }}

  # =============================================================
  #  GITHUB RELEASE
  # =============================================================
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # =============================================================
  #  DEPLOY — STAGING
  # =============================================================
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: staging
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Lowercase repository name
        run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to Staging Server
        run: |
          ssh -o StrictHostKeyChecking=no mifta@homeserver "
            set -e
            export DOCKER_HOST=${{ env.PODMAN_SOCKET }} &&
            export STG_REFINA_AUTH_IMAGE=${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/refina-auth &&
            export STG_REFINA_AUTH_IMAGE_TAG=${{ env.TAG_NAME }} &&

            cd ~/web/staging/refinamicroservices &&

            podman login -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }} ${{ env.REGISTRY }} &&
            docker compose -f docker-compose.yml pull stg-refina-auth &&
            docker compose -f docker-compose.yml up -d stg-refina-auth &&

            echo 'Deploy staging selesai: stg-refina-auth @ ${{ env.TAG_NAME }}'
          "

  # =============================================================
  #  DEPLOY — PRODUCTION
  # =============================================================
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Lowercase repository name
        run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to Production Server
        run: |
          ssh -o StrictHostKeyChecking=no mifta@homeserver "
            set -e
            export DOCKER_HOST=${{ env.PODMAN_SOCKET }} &&
            export PROD_REFINA_AUTH_IMAGE=${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/refina-auth &&
            export PROD_REFINA_AUTH_IMAGE_TAG=${{ env.TAG_NAME }} &&

            cd ~/web/production/refinamicroservices &&

            podman login -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }} ${{ env.REGISTRY }} &&
            docker compose -f docker-compose.yml pull prod-refina-auth &&
            docker compose -f docker-compose.yml up -d prod-refina-auth &&

            echo 'Deploy production selesai: prod-refina-auth @ ${{ env.TAG_NAME }}'
          "

  # =============================================================
  #  MIGRATE — STAGING
  # =============================================================
  migrate-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: migrate-staging
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Lowercase repository name
        run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Run Migration on Staging
        run: |
          ssh -o StrictHostKeyChecking=no mifta@homeserver "
            set -e
            export DOCKER_HOST=${{ env.PODMAN_SOCKET }} &&
            export APP_IMAGE_STG_MIGRATE=${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/migrate &&
            export APP_IMAGE_STG_MIGRATE_TAG=${{ env.TAG_NAME }} &&

            cd ~/web/staging/refinamicroservices &&

            podman login -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }} ${{ env.REGISTRY }} &&
            docker pull ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/migrate:${{ env.TAG_NAME }} &&

            echo 'Running database migration for staging...' &&
            docker compose -f docker-compose.yml run --rm stg-refina-auth-migrate &&

            echo 'Migration staging selesai.'
          "

  # =============================================================
  #  MIGRATE — PRODUCTION
  # =============================================================
  migrate-production:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: migrate-production
    permissions:
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Lowercase repository name
        run: echo "REPO_LOWERCASE=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Run Migration on Production
        run: |
          ssh -o StrictHostKeyChecking=no mifta@homeserver "
            set -e
            export DOCKER_HOST=${{ env.PODMAN_SOCKET }} &&
            export APP_IMAGE_PROD_MIGRATE=${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/migrate &&
            export APP_IMAGE_PROD_MIGRATE_TAG=${{ env.TAG_NAME }} &&

            cd ~/web/production/refinamicroservices &&

            podman login -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }} ${{ env.REGISTRY }} &&
            docker pull ${{ env.REGISTRY }}/${{ env.REPO_LOWERCASE }}/migrate:${{ env.TAG_NAME }} &&

            echo 'Running database migration for production...' &&
            docker compose -f docker-compose.yml run --rm prod-refina-auth-migrate &&

            echo 'Migration production selesai.'
          "